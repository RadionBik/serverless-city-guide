# Tools run from the dev env (uv) — versions come from pyproject.toml, not pinned revs.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: uv run mypy city_guide tests guide.py
        language: system
        types: [python]
        pass_filenames: false
